name: Quarto Publish

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2

      # tarvitaan erityisesti brms / rstan paketeille
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gfortran \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev

      - name: Install R packages
        run: |
          install.packages(c(
            "eurostat",
            "dplyr",
            "tsibble",
            "ggplot2",
            "lubridate",
            "feasts",
            "fable",
            "slider",
            "flextable",
            "brms",
            "modelsummary",
            "tidyverse",
            "dcurves",
            "scoringRules",
            "here",
            "wbstats",
            "countrycode",
            "janitor"
          ))
        shell: Rscript {0}

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4