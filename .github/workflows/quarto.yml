name: Quarto Publish

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: ubuntu-22.04

    permissions:
      contents: read
      pages: write
      id-token: write

    env:
      R_LIBS_USER: ~/.local/share/R

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.5.1'

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update

          sudo apt-get install -y \
            build-essential \
            gfortran \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libpng-dev \
            libtiff5-dev \
            libjpeg-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev \
            libudunits2-dev \
            cmake \
            make

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.local/share/R
            ~/.cache/R
          key: r-${{ runner.os }}-4.5.1-${{ hashFiles('**/*.qmd', '**/*.R') }}
          restore-keys: |
            r-${{ runner.os }}-4.5.1-

      - name: Install R packages
        run: |
          lib <- Sys.getenv("R_LIBS_USER")

          dir.create(lib, recursive = TRUE, showWarnings = FALSE)

          .libPaths(c(lib, .libPaths()))

          options(repos = c(
            CRAN = "https://cloud.r-project.org"
          ))

          install.packages(
            "pak",
            repos = "https://cloud.r-project.org",
            lib = lib
          )

          pak::pak(c(
            "eurostat",
            "corrplot",
            "dplyr",
            "tsibble",
            "ggplot2",
            "lubridate",
            "feasts",
            "fable",
            "slider",
            "flextable",
            "tidyverse",
            "dcurves",
            "scoringRules",
            "here",
            "wbstats",
            "strucchange",
            "countrycode",
            "janitor",
            "ggalluvial",
            "ggraph",
            "igraph",
            "ggtext",
            "quantreg",
            "tidybayes",
            "tidygraph",
            "broom",
            "spdep",
            "data.table",
            "glue",
            "pxweb",
            "readxl",
            "knitr",
            "future",
            "furrr",
            "fst",
            "ecmwfr",
            "sf",
            "terra",
            "stringr",
            "patchwork",
            "acledR",
            "modelsummary",
            "rstanarm",
            "zoo",
            "treemapify",
            "brms",
            "stan-dev/cmdstanr",
            "remotes"
          ))

        shell: Rscript {0}

      - name: Debug R libraries
        run: |
          cat("R version:\n")
          print(R.version.string)

          cat("\n.libPaths():\n")
          print(.libPaths())

          cat("\nInstalled package count:\n")
          print(nrow(installed.packages()))

        shell: Rscript {0}

      - name: Render site
        run: quarto render --no-cache

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4