name: Quarto Publish

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Pandoc
        uses: r-lib/actions/setup-pandoc@v2

      - name: Setup Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install archived CRAN packages from GitHub mirror
        run: |
          install.packages("remotes", repos = "https://cloud.r-project.org")
          remotes::install_github("cran/NetSwan", upgrade = "never")
        shell: Rscript {0}

      - name: Install R package dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 4
          packages: |
            eurostat
            corrplot
            dplyr
            tsibble
            ggplot2
            lubridate
            feasts
            fable
            slider
            flextable
            tidyverse
            dcurves
            scoringRules
            here
            wbstats
            countrycode
            janitor
            ggalluvial
            ggraph
            igraph
            ggtext
            quantreg
            tidybayes
            tidygraph
            broom
            spdep
            data.table
            glue
            pxweb
            readxl
            knitr
            future
            furrr
            fst
            ecmwfr
            sf
            terra
            stringr
            patchwork
            acledR
            modelsummary
            rstanarm
            zoo
            treemapify
            eurlex
            brms
            stan-dev/cmdstanr

      - name: Install CmdStan
        run: |
          cmdstanr::check_cmdstan_toolchain(fix = TRUE)
          cmdstanr::install_cmdstan(cores = 2)
        shell: Rscript {0}

      - name: Render site
        run: quarto render

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4