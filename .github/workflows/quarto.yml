name: build-site

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - uses: r-lib/actions/setup-r@v2

    - name: system dependencies for Stan
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gfortran make

    - uses: r-lib/actions/setup-r-dependencies@v2
      with:
        packages: |
          eurostat
          dplyr
          tsibble
          ggplot2
          lubridate
          feasts
          fable
          slider
          flextable
          tidyverse
          dcurves
          scoringRules
          here
          wbstats
          countrycode
          janitor
          ggalluvial
          ggraph
          igraph
          tidybayes
          broom
          modelsummary
          brms
          stan-dev/cmdstanr

    - name: install CmdStan
      run: |
        Rscript -e 'cmdstanr::install_cmdstan()'

    - name: render site
      run: |
        quarto render