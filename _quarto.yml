project:
  type: website
  output-dir: docs

website:
  title: "Kristian Vepsäläinen – Maailma on jakauma"
  site-url: https://kristianvepsalainen.github.io
  repo-url: https://github.com/KristianVepsalainen/KristianVepsalainen.github.io

  navbar:
    left:
      - href: index.qmd
        text: Etusivu
      - href: blog.qmd
        text: Blogi
      - href: about.qmd
        text: Minusta
      - href: pricing.qmd
        text: Hinnoittelu

  page-footer:
    left: "© 2026 Kristian Vepsäläinen"

  sidebar:
    style: docked

  open-graph: true
  twitter-card: true
  reader-mode: true

  search: true
  page-navigation: true

  comments:
    giscus:
      repo: KristianVepsalainen/KristianVepsalainen.github.io

format:
  html:
    theme:
      - litera
      - styles.scss
    toc: true
    toc-depth: 3
    code-copy: true
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    code-tools: true
    fig-responsive: true
    image-lazy-loading: true

execute:
  freeze: auto
  cache: true
  warning: false
  message: false
  code-fold: true